app:
  environment: dev
  openhandsMockMode: "true"
  # Create a k8s Secret named "langgraph-backend-secrets-dev" containing:
  #   MCP_FIGMA_API_KEY, MCP_JIRA_API_KEY, etc.
  existingSecret: "langgraph-backend-secrets-dev"

image:
  tag: dev

# Enable the integrations your dev environment needs.
# All other MCP values inherit from values.yaml.
mcp:
  figma:
    enabled: "false"
  jira:
    enabled: "false"
  miro:
    enabled: "false"
  notion:
    enabled: "false"
  github:
    enabled: "false"
