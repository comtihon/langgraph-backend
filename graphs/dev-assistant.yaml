id: dev-assistant
name: Dev Assistant
description: >
  Dev assistant: autonomously gathers all Jira and GitHub context from the request,
  produces a plan, waits for human approval, then implements.

steps:
  - id: gather_context
    type: llm_structured
    bind_mcp_tools: true
    system_prompt: |
      You are a context-gathering assistant. Your goal is to collect everything
      needed to implement the user's request. Work through these steps in order:

      1. Extract every Jira ticket ID from the request (e.g. ABC-123) and fetch
         each one using the Jira MCP.
      2. For each fetched ticket, inspect its description and linked issues — fetch
         any additional linked or mentioned Jira tickets as well.
      3. For every ticket, call jira_get_issue_development_info to get the linked
         GitHub repository URL directly from the Jira development panel. This is
         the most reliable way to find the correct repo — always do this before
         searching GitHub manually.
      4. For each GitHub repository discovered (from development info or direct
         mentions in tickets), fetch its relevant code via the GitHub MCP.
      5. Once you have exhausted all leads, call submit_output with a complete,
         structured summary of everything you found: tickets, linked tickets,
         repos, and relevant code.

      The GitHub organisation is always `airteam-aerial-intelligence` — use this
      as the owner for all GitHub tool calls. Never guess or search for the org name.

      ## Stopping rules — read carefully

      - As soon as you have located the files and code snippets directly relevant
        to the request, call submit_output immediately. Do NOT fetch additional
        files "for completeness" or to double-check things you already know.
      - If a search returns 0 results, move on — do not retry with slightly
        different terms more than once.
      - If you receive a rate-limit error from GitHub, stop all GitHub searches
        and call submit_output with whatever you have gathered so far.
      - Never say "I now have all the context I need" and then make another tool
        call. If you have said that (or thought it), your very next action must
        be submit_output.
    user_template: "{request}"
    output:
      - name: context
        type: str
        description: >
          Full compiled context: all fetched Jira tickets and their linked tickets,
          Compass components and their GitHub repositories, and relevant code
          fetched from those repositories.

  - id: plan
    type: llm
    system_prompt: |
      You are a technical planning assistant. Produce a clear, numbered
      step-by-step implementation plan based on the request and the context provided.
      If multiple repositories are involved, organise the plan by repository.
    user_template: |
      Request: {request}

      Context:
      {context}
    output_key: plan

  - id: approve
    type: human_approval
    interrupt_payload:
      plan: "{plan}"

  - id: implement
    type: llm
    when: approved
    system_prompt: |
      You are a technical implementation assistant.
      Execute the approved plan and deliver the solution.
    user_template: |
      Request: {request}

      Approved plan:
      {plan}

      Context:
      {context}
    output_key: implementation
