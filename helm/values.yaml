replicaCount: 1

image:
  repository: langgraph-backend
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8000

app:
  environment: dev
  workflowDefinitionsPath: /app/workflows
  openhandsBaseUrl: http://openhands:3000
  openhandsMockMode: "true"
  # Name of a pre-existing k8s Secret whose keys are injected as env vars.
  # Required keys for enabled integrations: OPENHANDS_API_KEY,
  # MCP_FIGMA_API_KEY, MCP_JIRA_API_KEY, MCP_MIRO_API_KEY,
  # MCP_NOTION_API_KEY, MCP_GITHUB_API_KEY.
  existingSecret: ""

mongodb:
  uri: mongodb://mongodb:27017
  database: langgraph_backend

# MCP integration settings.
# API keys must be provided via existingSecret (see above) — never in values files.
mcp:
  figma:
    enabled: "false"
    transport: streamable_http
    # Official Figma remote MCP endpoint.
    url: "https://www.figma.com/api/mcp/v1"
  jira:
    enabled: "false"
    transport: streamable_http
    # Atlassian remote MCP endpoint — requires an Atlassian API token.
    url: "https://mcp.atlassian.com/v1/mcp"
  miro:
    enabled: "false"
    transport: streamable_http
    # Miro remote MCP endpoint.
    url: "https://mcp.miro.com/v1"
  notion:
    enabled: "false"
    transport: streamable_http
    # Notion remote MCP endpoint — requires an OAuth access token (not an integration token).
    url: "https://mcp.notion.com/mcp"
  github:
    enabled: "false"
    transport: streamable_http
    # GitHub MCP endpoint — requires a GitHub personal access token.
    url: "https://api.githubcopilot.com/mcp/"

resources: {}
nodeSelector: {}
affinity: {}
tolerations: []
