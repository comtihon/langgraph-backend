replicaCount: 1

image:
  repository: ghcr.io/comtihon/langgraph-backend
  tag: v1.2.35
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8000

# All non-secret env vars passed to the container as a ConfigMap.
# Keys become env var names; values become env var values.
config: {}

# Secrets injected as individual env vars.
# Key becomes the env var name (uppercased if needed by convention).
# Value must have 'name' (k8s Secret name) and 'key' (Secret data key).
# Example:
#   ANTHROPIC_API_KEY:
#     name: langgraph-backend-secrets
#     key: ANTHROPIC_API_KEY
secrets: {}

# LLM provider integrations. Free-form list — any entry that exposes an
# OpenAI / LiteLLM-compatible HTTP endpoint can be added without code changes.
# Each entry is rendered into:
#   ConfigMap: LLM_INTEGRATIONS (JSON-encoded list, minus the secret api key)
#   Deployment env: <NAME>_API_KEY from the referenced k8s Secret
#     (NAME uppercased, dashes → underscores)
# Use `apiKeyEnv` to override the env var name explicitly.
# Example:
#   llmIntegrations:
#     - name: anthropic
#       baseUrl: https://api.anthropic.com/v1
#       defaultModel: claude-sonnet-4-6
#       apiKeySecret:
#         name: langgraph-backend-secrets
#         key: ANTHROPIC_API_KEY
#     - name: openrouter
#       baseUrl: https://openrouter.ai/api/v1
#       defaultModel: anthropic/claude-sonnet-4.5
#       apiKeySecret:
#         name: langgraph-backend-secrets
#         key: OPENROUTER_API_KEY
#     - name: my-litellm-proxy
#       baseUrl: https://proxy.example.com/v1
#       defaultModel: some/model
#       apiKeyEnv: MY_PROXY_KEY        # optional, defaults to MY_LITELLM_PROXY_API_KEY
#       apiKeySecret:
#         name: my-proxy-secret
#         key: API_KEY
llmIntegrations: []

# Graph definitions mounted as YAML files under GRAPH_DEFINITIONS_PATH.
# Key becomes the file name (without .yaml extension), value is the YAML content.
graphs: {}

ingress:
  enabled: false
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt"
  hosts: []
  # - host: langgraph.example.com
  #   paths:
  #     - path: /
  #       pathType: Prefix
  tls: []
  # - secretName: langgraph-backend-tls
  #   hosts:
  #     - langgraph.example.com

resources: {}
nodeSelector: {}
affinity: {}
tolerations: []
