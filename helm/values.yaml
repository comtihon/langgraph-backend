replicaCount: 1

image:
  repository: ghcr.io/comtihon/langgraph-backend
  tag: v1.0.22
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8000

# All non-secret env vars passed to the container as a ConfigMap.
# Keys become env var names; values become env var values.
config: {}

# Secrets injected as individual env vars.
# Key becomes the env var name (uppercased if needed by convention).
# Value must have 'name' (k8s Secret name) and 'key' (Secret data key).
# Example:
#   ANTHROPIC_API_KEY:
#     name: langgraph-backend-secrets
#     key: ANTHROPIC_API_KEY
secrets: {}

# Graph definitions mounted as YAML files under GRAPH_DEFINITIONS_PATH.
# Key becomes the file name (without .yaml extension), value is the YAML content.
graphs: {}

ingress:
  enabled: false
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt"
  hosts: []
  # - host: langgraph.example.com
  #   paths:
  #     - path: /
  #       pathType: Prefix
  tls: []
  # - secretName: langgraph-backend-tls
  #   hosts:
  #     - langgraph.example.com

resources: {}
nodeSelector: {}
affinity: {}
tolerations: []
