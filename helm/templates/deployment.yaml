apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "langgraph-backend.fullname" . }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "langgraph-backend.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "langgraph-backend.name" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      containers:
        - name: backend
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 8000
              name: http
{{- if .Values.config }}
          envFrom:
            - configMapRef:
                name: {{ include "langgraph-backend.fullname" . }}-config
{{- end }}
{{- if .Values.secrets }}
          env:
{{- range $envKey, $secret := .Values.secrets }}
            - name: {{ $envKey }}
              valueFrom:
                secretKeyRef:
                  name: {{ $secret.name }}
                  key: {{ $secret.key }}
{{- end }}
{{- end }}
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
{{- if .Values.graphs }}
          volumeMounts:
            - name: graph-definitions
              mountPath: /app/graphs
              readOnly: true
{{- end }}
          resources:
{{ toYaml .Values.resources | indent 12 }}
{{- if .Values.graphs }}
      volumes:
        - name: graph-definitions
          configMap:
            name: {{ include "langgraph-backend.fullname" . }}-graphs
{{- end }}
      nodeSelector:
{{ toYaml .Values.nodeSelector | indent 8 }}
      affinity:
{{ toYaml .Values.affinity | indent 8 }}
      tolerations:
{{ toYaml .Values.tolerations | indent 8 }}
