{{- $sa := include "langgraph-backend.fullname" . }}
{{- $ns := .Release.Namespace }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ $sa }}-agent-manager
  namespace: {{ $ns }}
  labels:
    app.kubernetes.io/name: {{ include "langgraph-backend.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
rules:
  # Helm stores release state as secrets
  - apiGroups: [""]
    resources: ["secrets", "configmaps", "services", "serviceaccounts",
                "pods", "persistentvolumeclaims", "events"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets", "statefulsets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["batch"]
    resources: ["jobs", "cronjobs"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ $sa }}-agent-manager
  namespace: {{ $ns }}
  labels:
    app.kubernetes.io/name: {{ include "langgraph-backend.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
subjects:
  - kind: ServiceAccount
    name: {{ $sa }}
    namespace: {{ $ns }}
roleRef:
  kind: Role
  name: {{ $sa }}-agent-manager
  apiGroup: rbac.authorization.k8s.io
