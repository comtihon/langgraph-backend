name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    name: pytest
    runs-on: ubuntu-latest
    services:
      mongo:
        image: mongo:7
        ports:
          - 27017:27017

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        # copilotkit pins langchain<0.4 (langchain-core<1.0); langchain-mcp-adapters
        # needs langchain-core>=1.0 — install in two passes so pip doesn't refuse.
        run: |
          pip install \
            "copilotkit>=0.1.39,<1.0.0" \
            "langchain>=0.3.28,<0.4.0" \
            "langchain-anthropic>=0.3.22,<0.4.0" \
            "langchain-openai>=0.3.35,<0.4.0" \
            "langgraph>=0.5.4,<0.6.0" \
            "uvicorn[standard]>=0.44.0,<1.0.0" \
            "pydantic-settings>=2.13.1,<3.0.0" \
            "pyjwt[crypto]>=2.12.1,<3.0.0" \
            "motor>=3.7.1,<4.0.0"
          pip install \
            "langchain-mcp-adapters>=0.2.2,<1.0.0" \
            "langchain-google-genai>=4.2.1,<5.0.0"
          pip install --no-deps -e .
          pip install \
            "pytest>=9.0.3,<10.0.0" \
            "pytest-asyncio>=1.3.0,<2.0.0" \
            "asgi-lifespan>=2.1.0,<3.0.0"

      - name: Run tests
        run: pytest

  release:
    name: Tag, package, bump
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && !contains(github.event.head_commit.message, '[skip ci]')
    permissions:
      contents: write
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Read version
        id: version
        run: |
          VERSION=$(cat VERSION | tr -d '[:space:]')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Create and push tag
        run: |
          git tag "${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

      - uses: azure/setup-helm@v4

      - name: Build Helm package
        run: |
          helm package helm/ \
            --version "${{ steps.version.outputs.version }}" \
            --app-version "${{ steps.version.outputs.version }}" \
            --destination dist/

      - name: Upload Helm chart artifact
        uses: actions/upload-artifact@v4
        with:
          name: helm-chart-${{ steps.version.outputs.version }}
          path: dist/*.tgz
          retention-days: 90

      - name: Bump patch version
        id: bump
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          MAJOR=$(echo "$VERSION" | cut -d. -f1)
          MINOR=$(echo "$VERSION" | cut -d. -f2)
          PATCH=$(echo "$VERSION" | cut -d. -f3)
          NEW_VERSION="$MAJOR.$MINOR.$((PATCH + 1))"
          echo "$NEW_VERSION" > VERSION
          echo "new_version=$NEW_VERSION" >> "$GITHUB_OUTPUT"

      - name: Commit bumped version
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add VERSION
          git commit -m "chore: bump version to ${{ steps.bump.outputs.new_version }} [skip ci]"
          git push origin main

  publish:
    name: Build & push Docker image
    runs-on: ubuntu-latest
    needs: release
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/comtihon/langgraph-backend:latest
            ghcr.io/comtihon/langgraph-backend:v${{ needs.release.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
