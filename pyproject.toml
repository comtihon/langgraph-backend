[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "langgraph-backend"
version = "0.1.0"
description = "AI development orchestration backend built with FastAPI, LangGraph, LangServe, and MongoDB."
readme = "README.md"
requires-python = ">=3.11"
license = { text = "MIT" }
authors = [{ name = "Airteam" }]
dependencies = [
  "fastapi>=0.115.0,<1.0.0",
  "uvicorn[standard]>=0.30.0,<1.0.0",
  "langgraph>=0.2.0,<1.0.0",
  "langchain>=0.3.0,<1.0.0",
  "langserve>=0.3.0,<1.0.0",
  "pydantic>=2.8.0,<3.0.0",
  "pydantic-settings>=2.4.0,<3.0.0",
  "motor>=3.6.0,<4.0.0",
  "pymongo>=4.8.0,<5.0.0",
  "httpx>=0.27.0,<1.0.0",
  "langchain-mcp-adapters>=0.1.0,<1.0.0"
]

[project.optional-dependencies]
dev = [
  "pytest>=8.3.0,<9.0.0",
  "pytest-asyncio>=0.24.0,<1.0.0"
]

[tool.setuptools]
package-dir = { "" = "." }

[tool.setuptools.packages.find]
include = ["app*"]

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
